version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # Optional: PostgreSQL database for production use
  # db:
  #   image: postgres:15
  #   environment:
  #     POSTGRES_DB: supply_chain
  #     POSTGRES_USER: admin
  #     POSTGRES_PASSWORD: admin
  #   volumes:
  #     - db_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  db_data: